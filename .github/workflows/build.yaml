name: Java CI Pipeline

on:
  push

jobs:

  checkout-and-secret-scan:

    runs-on: ubuntu-latest

    steps:

      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Verify Repository Contents
      - name: Verify Checkout
        run: |
          pwd
          ls -ltr

      # 2. Secret Scan
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2